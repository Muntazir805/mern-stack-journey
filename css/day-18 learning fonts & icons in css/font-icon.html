<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> 

    <!-- Font Awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"> 

    <link rel="stylesheet" href="font-icon-style.css">  
    <title>Learning Fonts & Icons in CSS</title>
</head>

<body>

      <header class="header">
           <h1>Typography Showcase</h1>
           <p>Learning Fonts & Icons in CSS</p>
      </header>

      <section>

        <h2>Google Font</h2>

        <p class="google-font">
            This text uses the Google Font "Roboto"
        </p>

      </section>

      <section>

        <h2>Local Font</h2>

        <p class="local-font">
            This text uses a local font from my computer.
        </p>

      </section>

      <section>

        <h2>Custom Font (@font-face)</h2>

        <p class="custom-font">
            This text uses a custom font.
        </p>

      </section>

      <section>

        <h2>Font Awesome Icons</h2>

        <div class="icons">
           
           <i class="fa-solid fa-house"></i>

           <i class="fa-solid fa-user"></i>

           <i class="fa-solid fa-envelope"></i>

           <i class="fa-solid fa-phone"></i>

           <i class="fa-brands fa-github"></i>
            
        </div>

      </section>




</body>
</html>
