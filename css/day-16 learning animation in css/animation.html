<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="animation-style.css">
    <title>Learning Animation In CSS</title>
</head>
<body>

    <h1>CSS Animation Practice</h1>


      <!-- Loading Spinner -->

      <section class="container">

         <h2>Loading Spinner</h2>

         <div class="spinner"> 

         </div>

      </section>


      <!-- Bouncing Ball -->

      <section>
         
        <h2>Bouncing Ball</h2>

        <div class="bounce-ball">

        </div>

      </section>


      <!-- Pulsing Button -->
       
      <section>

        <h2>Pulsing Button</h2>

        <button class="pulse-btn">
            Click Me
        </button>

      </section>


      <!-- Fading Text  -->

      <section>
          
        <h2>Fading Text</h2>

        <p class="fade-text">
            Learning CSS Animation is Fun!
        </p>

      </section>

</body>
</html>
