<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="filters-style.css">
    <title>Learning Filters & Modern Effects in CSS</title>
</head>
<body>

    <section class="hero-section">

        <div class="card-content">

           <h1>Glassmorphism Card</h1>

           <p>
                Learning CSS Filters and Backdrop Filter.
           </p>

           <button>Explore</button>

       </div>

    </section>

    <section class="button-section">
         <h2>CSS Filters Practice In Buttons</h2>
        <div class="btns">
            <button class="btn blur-btn">Blur</button>

            <button class="btn bright-btn">Brightness</button>

            <button class="btn contrast-btn">Contrast</button>

            <button class="btn multi-btn">Multiple Filters</button>
        </div>
    </section>

    <section class="main-section">

        <h2>CSS Filters Practice In Card Images</h2>

         <div class="container">
            
            <!-- Original -->
            <div class="card">
                <h3>Original</h3>
                <img src="https://picsum.photos/300/200" alt="Image">
            </div>

            <!-- Blur -->
            <div class="card">
                <h3>Blur</h3>
                <img class="blur" src="https://picsum.photos/300/200?1" alt="Image">
            </div>

            <!-- Brightness -->
            <div class="card">
                <h3>Brightness</h3>
                 <img class="brightness" src="https://picsum.photos/300/200?2" alt="Image">
            </div>

            <!-- Contrast -->
            <div class="card">
                <h3>Contrast</h3>
                <img class="contrast" src="https://picsum.photos/300/200?3" alt="Image">
            </div>

            <!-- Grayscale -->
            <div class="card">
                <h3>Grayscale</h3>
                <img class="grayscale" src="https://picsum.photos/300/200?4" alt="Image">
            </div>

            <!-- Sepia -->
            <div class="card">
                <h3>Sepia</h3>
                <img class="sepia" src="https://picsum.photos/300/200?5" alt="Image">
            </div>

            <!-- Invert -->
            <div class="card">
                <h3>Invert</h3>
                <img class="invert" src="https://picsum.photos/300/200?6" alt="Image">
            </div>

            <!-- Multiple Filters -->
            <div class="card">
                <h3>Multiple Filters</h3>
                <img class="multiple" src="https://picsum.photos/300/200?7" alt="Image">
            </div>



         </div>

    </section>

  
      
  
</body>
</html>
