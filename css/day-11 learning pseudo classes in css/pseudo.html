<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pseudo-style.css">
    <title>Practice Pseudo Classes in CSS</title>
</head>
<body>

    <h1>CSS Pseudo Classes Practice</h1>

    <div class="container">
        
        <!-- User Interaction  -->
        <section>

            <h2>User Interaction</h2>

            <a href="https://google.com" target="_blank">Visit Google</a>  <br> <br>

            <button>Hover & Click Me</button>

        </section>

        <hr>

        <!-- Interaction Form  -->
        <section>

            <h2>Registration Form</h2>

            <form>

                <label for="fullname">Full Name *</label>
                <input type="text" id="fullname" placeholder="Enter Your Full Name" required>

                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="Enter Your Email Address" required>

                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="03XXXXXXXXX">

                <label for="password">Password *</label>
                <input type="password" id="password" required>

                <label>
                    <input type="checkbox">
                    I agree to the terms
                </label>

                <br> <br>

                <input type="text" value="Enabled Field">

                <br> <br>

                <button type="submit">Register</button>

            </form>

        </section> 


        <!-- Structural Pseudo Classes  -->
        <section>

            <h2>Student List</h2>

            <ul>

                <li>Ali</li>

                <li>Ahmed</li>

                <li>Fatima</li>

                <li>Hassan</li>

                <li>Ayesha</li>

            </ul>

            <div class="single">
                <p>Only Child Paragraph</p>
            </div>

        </section> 

    </div>

</body>
</html>
