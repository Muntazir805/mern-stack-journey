<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="variable-style.css">
    <title>Learning Variables & Custom Properties in CSS</title>
</head>
<body>
     
    <!-- Hidden Checkbox  -->
    <input type="checkbox" id="theme">

    <div class="container">

        <!-- Theme Toggle  -->
        <label for="theme" class="switch">
            🌞 / 🌙 
        </label> 

        <div class="card">
            
            <h1>Theme Switch UI</h1>

            <p>
                This project demonstrates CSS Variables and the <strong>var()</strong> function using only HTML and CSS.
            </p>

            <button>Get Started</button>
        </div>

    </div>
</body>
</html>
