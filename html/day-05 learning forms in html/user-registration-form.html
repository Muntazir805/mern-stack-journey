<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> User Registration Form</title>
</head>
<body>
      <h1>User Registration Form</h1>
      <p>Please fill out the form below.</p>

       <!-- collects user data using form element -->
      <form action="#" method="post">
        <!-- label identifies the input field  -->
        <label for="username">Full Name:</label> <br>
        <!-- Text input for name  -->
        <input type="text" name="username" id="username" placeholder="Enter Your Full Name" required>  

        <!-- line breaks -->
        <br> <br>

        <!-- label for email input  -->
        <label for="Email">Email:</label> <br>
        <!-- email input with validation  -->
        <input type="email" id="email" name="email" placeholder="Enter Your Email Address" required> 
        
        <br> <br>
 
        <!-- label for password field  -->
        <label for="password">Password:</label> <br>
        <!-- password input hides characters  -->
        <input type="password" name="password" id="password" placeholder="Enter Your Password" required> <br> <br>

        <!-- Radio buttons allow one selection  -->
        <label>Gender: <br>
          <input type="radio" name="gender" id="male">
          <label for="male">Male </label> 
          <input type="radio" name="gender" id="female">
          <label for="female">Female </label> 
        </label>

        <br> <br>
        
        <!-- Dropdown menu for choices  -->
        <label for="city">City:</label><br>
        <select name="city" id="city">
            <option value="Karachi">Karachi</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Sukkur">Sukkur</option>
        </select> 
        
        <br> <br>

        <!-- Multiline-line text input  -->
        <label for="comment">About You:</label> <br>
        <textarea name="comment" id="comment" cols="32" rows="6"></textarea> 
        
        <br> <br>

        <!-- Checkboxes allow multiple selections  -->
        <label >Skills: <br>
          <input type="checkbox" name="language" id="html">
          <label for="html">HTML</label>
          <input type="checkbox" name="language" id="css">
          <label for="css">CSS</label>
        </label> 
        
        <br> <br>
         <!-- Submits form data  -->
        <input type="submit" value="Register"> 

        <!-- Resets all form fields  -->
        <input type="reset" value="Reset">

        <br> <br> <br> <br>

      </form>
</body>
</html>
